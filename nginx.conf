worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Increase timeouts for AI generation (Gemini can take 60+ seconds)
    proxy_connect_timeout 300;
    proxy_send_timeout    300;
    proxy_read_timeout    300;
    send_timeout          300;

    # Increase max upload size for images
    client_max_body_size 50M;

    server {
        listen 7860;

        # ── Frontend (static files on port 8080) ─────────────
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Main API: /generate endpoint (POST) ─────────────
        # This is the endpoint hit when "Generate Image" is clicked
        location /generate {
            proxy_pass http://127.0.0.1:8100/generate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CRITICAL for streaming NDJSON responses
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_http_version 1.1;
        }

        # ── Main API: /health endpoint (GET) ─────────────────
        location /health {
            proxy_pass http://127.0.0.1:8100/health;
            proxy_set_header Host $host;
        }

        # ── Facebook Service (all endpoints under /fb/) ──────
        location /fb/ {
            rewrite ^/fb/(.*) /$1 break;
            proxy_pass http://127.0.0.1:8101;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
